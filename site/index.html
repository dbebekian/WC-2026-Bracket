<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup Pool '26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1221; --surface:#141E33; --surface2:#1B2942; --line:#27344f;
    --text:#F2F4F8; --muted:#8492AD;
    --pitch:#06C167; --pitch-dim:#0c7a45; --gold:#F5B92E; --red:#FF5A66;
    --disp:'Barlow Condensed','Arial Narrow',system-ui,sans-serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.45}
  .wrap{max-width:880px;margin:0 auto;padding:0 16px 120px}
  header.top{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--ink) 70%,rgba(11,18,33,0));
    padding:18px 16px 12px;border-bottom:1px solid var(--line);backdrop-filter:blur(6px)}
  .top-inner{max-width:880px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand .ball{font-size:22px;line-height:1}
  .brand h1{font-family:var(--disp);font-weight:800;letter-spacing:.04em;text-transform:uppercase;font-size:19px;margin:0;white-space:nowrap}
  .brand h1 span{color:var(--pitch)}
  .score{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:7px 12px}
  .score .who{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;line-height:1}
  .score .who b{display:block;color:var(--text);font-size:13px;letter-spacing:0;text-transform:none;margin-top:2px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .score .pts{font-family:var(--disp);font-weight:800;font-size:30px;color:var(--gold);line-height:.9;font-variant-numeric:tabular-nums}
  .score .pts small{display:block;font-size:9px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;text-align:right}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.28);color:#fff}100%{transform:scale(1)}}
  .pts.bump{animation:pop .5s ease}
  @keyframes drop{0%{transform:scale(1)}40%{transform:scale(.82);color:var(--red)}100%{transform:scale(1)}}
  .pts.dip{animation:drop .5s ease}
  nav.tabs{max-width:880px;margin:14px auto 0;display:flex;flex-wrap:wrap;gap:6px;padding:0 16px}
  .tab{flex:1 1 auto;min-width:64px;white-space:nowrap;text-align:center;font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:14px;
    color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 6px;cursor:pointer;user-select:none;transition:.15s}
  .tab:hover{color:var(--text)} .tab.active{color:var(--ink);background:var(--pitch);border-color:var(--pitch)}
  .tab.commish.active{background:var(--gold);border-color:var(--gold)}
  .roundbar{display:flex;gap:8px;overflow-x:auto;padding:18px 0 6px;scrollbar-width:none}
  .roundbar::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:13px;color:var(--muted);
    background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:7px}
  .pill.active{color:var(--text);border-color:var(--pitch);background:var(--surface2)}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .pill.open .dot{background:var(--pitch);box-shadow:0 0 0 3px rgba(6,193,103,.18)}
  .pill.locked .dot{background:var(--gold)}
  .banner{margin:6px 0 16px;padding:14px 16px;border-radius:14px;background:var(--surface);border:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .banner h2{font-family:var(--disp);font-weight:800;text-transform:uppercase;letter-spacing:.03em;font-size:22px;margin:0}
  .banner p{margin:3px 0 0;color:var(--muted);font-size:13px}
  .banner .val{font-family:var(--disp);font-weight:700;font-size:13px;color:var(--gold);border:1px solid var(--line);border-radius:999px;padding:5px 12px;white-space:nowrap}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .gcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .gcard .gh{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--line)}
  .gcard .gh .gl{font-family:var(--disp);font-weight:800;font-size:16px;text-transform:uppercase;letter-spacing:.05em}
  .gcard .gh .pick-n{font-size:11px;color:var(--muted)}
  .team{display:flex;align-items:center;gap:11px;padding:11px 14px;cursor:pointer;border-top:1px solid rgba(39,52,79,.5);transition:background .12s}
  .team:first-of-type{border-top:none}
  .team .fl{font-size:20px;width:24px;text-align:center;flex:0 0 auto}
  .flag{width:24px;height:18px;border-radius:3px;object-fit:cover;vertical-align:middle;display:inline-block;box-shadow:0 0 0 1px rgba(255,255,255,.1)}
  .noflag{display:inline-flex;align-items:center;justify-content:center;font-size:13px;box-shadow:none}
  .team .nm{flex:1;font-size:14.5px;font-weight:500}
  .team .stamp{font-family:var(--disp);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);border-radius:6px;padding:3px 7px;opacity:0}
  .team:hover{background:var(--surface2)}
  .team.sel{background:rgba(6,193,103,.12)} .team.sel .stamp{opacity:1;color:var(--pitch);border-color:var(--pitch-dim)}
  .team.correct{background:rgba(6,193,103,.14)} .team.correct .stamp{opacity:1;color:var(--pitch);border-color:var(--pitch)}
  .team.miss{background:rgba(255,90,102,.10)} .team.miss .stamp{opacity:1;color:var(--red);border-color:var(--red)}
  .team.ro{cursor:default}
  .match{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .match .mh{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:0 2px 9px}
  .vs{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .side{display:flex;align-items:center;gap:9px;padding:11px;border:1px solid var(--line);border-radius:11px;cursor:pointer;background:var(--surface2);transition:.12s;min-width:0}
  .side .fl{font-size:19px}
  .side .nm{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .side.right{flex-direction:row-reverse;text-align:right}
  .side:hover{border-color:var(--muted)}
  .side.sel{border-color:var(--pitch);background:rgba(6,193,103,.14)}
  .side.correct{border-color:var(--pitch);background:rgba(6,193,103,.2)}
  .side.miss{border-color:var(--red);background:rgba(255,90,102,.12)}
  .side.ro{cursor:default}
  .vs .mid{font-family:var(--disp);font-weight:700;color:var(--muted);font-size:13px}
  .side.empty{cursor:default;background:var(--surface);border-style:dashed;opacity:.85}
  .side .slot{font-size:12px;color:var(--muted);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .side.right .slot{width:100%;text-align:right}
  .match .mh .in{color:var(--pitch);font-weight:700}
  .champ{display:flex;align-items:center;gap:8px;background:linear-gradient(90deg,rgba(245,185,46,.16),transparent);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:12px;font-size:14px;color:var(--muted)}
  .champ.set{color:var(--text)}
  .champ b{display:inline-flex;align-items:center;gap:6px;color:var(--gold);font-family:var(--disp);font-weight:800;font-size:16px;letter-spacing:.02em}
  .champ b .flag{width:22px;height:16px}
  .pp-chips{display:flex;flex-wrap:wrap;gap:6px}
  .lb{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .lrow{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line)}
  .lrow:first-child{border-top:none}
  .lrow .rk{font-family:var(--disp);font-weight:800;font-size:18px;color:var(--muted);width:26px;text-align:center;font-variant-numeric:tabular-nums}
  .lrow .nm{flex:1;font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow .br{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .chip{font-size:10px;font-family:var(--disp);font-weight:600;color:var(--muted);background:var(--surface2);border-radius:5px;padding:2px 6px;letter-spacing:.03em;font-variant-numeric:tabular-nums}
  .lrow .tot{font-family:var(--disp);font-weight:800;font-size:24px;color:var(--text);width:54px;text-align:right;font-variant-numeric:tabular-nums}
  .lrow.leader{background:linear-gradient(90deg,rgba(245,185,46,.13),transparent)}
  .lrow.leader .rk{color:var(--gold)} .lrow.leader .tot{color:var(--gold)}
  .lrow.me{box-shadow:inset 3px 0 0 var(--pitch)}
  .btn{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:15px;background:var(--pitch);color:var(--ink);
    border:none;border-radius:11px;padding:13px 22px;cursor:pointer;transition:.12s}
  .btn:hover{filter:brightness(1.07)}
  .btn:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;filter:none}
  .btn.gold{background:var(--gold)}
  .savebar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:linear-gradient(0deg,var(--ink) 60%,transparent);padding:16px;display:flex;justify-content:center}
  .savebar .inner{max-width:880px;width:100%;display:flex;gap:10px;align-items:center;justify-content:space-between}
  .savebar .note{font-size:12px;color:var(--muted)}
  .toast{position:fixed;left:50%;top:84px;transform:translateX(-50%) translateY(-12px);background:var(--pitch);color:var(--ink);
    font-family:var(--disp);font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:10px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:.25s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--red);color:#fff}
  .empty{text-align:center;color:var(--muted);padding:52px 20px;font-size:14px}
  .empty .big{font-family:var(--disp);font-weight:700;font-size:20px;color:var(--text);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .empty .lockbig{font-size:34px;line-height:1;margin-bottom:10px;opacity:.85}
  .gate{max-width:420px;margin:9vh auto 0;padding:30px 24px;background:var(--surface);border:1px solid var(--line);border-radius:20px}
  .gate h1{font-family:var(--disp);font-weight:800;text-transform:uppercase;letter-spacing:.03em;font-size:30px;margin:0 0 4px}
  .gate h1 span{color:var(--pitch)}
  .gate p{color:var(--muted);font-size:14px;margin:0 0 22px}
  .field label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
  .field input[type=text],.field input[type=password]{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:11px;color:var(--text);padding:13px 14px;font-size:16px;font-family:var(--body)}
  .field input:focus{outline:none;border-color:var(--pitch)}
  .cbox{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
  .cbox h3{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:16px;margin:0 0 4px}
  .cbox .sub{color:var(--muted);font-size:12.5px;margin:0 0 14px}
  .crow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line);flex-wrap:wrap}
  .crow:first-of-type{border-top:none}
  .crow .lbl{font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:.03em;font-size:14px}
  .mini{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:12px;border:1px solid var(--line);
    background:var(--surface2);color:var(--text);border-radius:8px;padding:7px 11px;cursor:pointer}
  .mini.on{background:var(--pitch);color:var(--ink);border-color:var(--pitch)}
  .mini.gold{background:var(--gold);color:var(--ink);border-color:var(--gold)}
  .pname{flex:1;min-width:140px;background:var(--ink);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:9px 11px;font-size:15px;font-family:var(--body)}
  .pname:focus{outline:none;border-color:var(--pitch)}
  .status-tag{font-size:11px;font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:6px}
  .st-open{color:var(--pitch);border:1px solid var(--pitch-dim)}
  .st-locked{color:var(--gold);border:1px solid var(--gold)}
  .st-soon{color:var(--muted);border:1px solid var(--line)}
  .live{color:var(--red);font-weight:700}
  /* player picks modal (read-only) */
  .lrow[data-pl]{cursor:pointer;transition:background .12s}
  .lrow[data-pl]:hover{background:rgba(255,255,255,.03)}
  .pp-overlay{position:fixed;inset:0;z-index:50;background:rgba(7,11,20,.72);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
  .pp-card{background:var(--surface);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;animation:ppUp .22s ease}
  @keyframes ppUp{from{transform:translateY(24px);opacity:.5}to{transform:translateY(0);opacity:1}}
  @media(min-width:560px){.pp-overlay{align-items:center}.pp-card{border-radius:18px}}
  .pp-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .pp-head h3{margin:0;font-family:var(--disp);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pp-x{background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:9px;width:32px;height:32px;cursor:pointer;font-size:14px;flex:0 0 auto}
  .pp-body{overflow-y:auto;padding:6px 18px 26px}
  .pp-round{margin-top:16px}
  .pp-round h4{margin:0 0 8px;font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:13px;color:var(--pitch)}
  .pp-hidden{color:var(--muted);font-size:13px;background:var(--surface2);border:1px dashed var(--line);border-radius:10px;padding:11px 14px}
  .pp-grow{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-top:1px solid var(--line)}
  .pp-grow:first-child{border-top:none}
  .pp-lbl{font-family:var(--disp);font-weight:700;font-size:13px;color:var(--muted);width:70px;flex:0 0 auto;padding-top:1px}
  .pp-teams{display:flex;flex-direction:column;gap:3px}
  .pp-team{font-size:13px}
  .pp-team.empty{color:var(--muted)}
  .pp-team.correct{color:var(--pitch)}
  .pp-team.miss{color:var(--red)}
  .pp-match{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:13px}
  .pp-match:first-child{border-top:none}
  .pp-vs{color:var(--muted);flex:1;min-width:0}
  .pp-pick{font-weight:600;flex:0 0 auto;text-align:right}
  .pp-pick.correct{color:var(--pitch)} .pp-pick.miss{color:var(--red)}
  .pp-hidden-inline{color:var(--muted);font-style:italic;flex:0 0 auto;font-size:12px}
  /* World Cup 2026 — schedule */
  .schday{margin-top:16px}
  .schdate{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:13px;color:var(--muted);padding:0 2px 7px}
  .schrow{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px}
  .schtop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
  .schstage{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--line);border-radius:5px;padding:2px 7px}
  .schright{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .schscore{font-family:var(--disp);font-weight:800;font-size:17px;font-variant-numeric:tabular-nums}
  .schstat{font-size:12px;color:var(--muted)}
  .schstat.ft{color:var(--text);font-family:var(--disp);font-weight:700}
  .schstat.live{color:var(--red);font-weight:700}
  .schteams{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}
  .schteams .schv{color:var(--muted);font-weight:400;font-size:12px;flex:0 0 auto}
  .schteams .nmL{flex:1;min-width:0;display:flex;align-items:center;gap:6px}
  .schteams .nmR{flex:1;min-width:0;display:flex;align-items:center;gap:6px;justify-content:flex-end;text-align:right}
  .schteams .win{color:var(--pitch)}
  .schteams .ph{color:var(--muted);font-weight:500;font-size:13px}
  /* World Cup 2026 — group tables */
  .gtab{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 12px 6px}
  .gth{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .gth .ttl{font-family:var(--disp);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:15px}
  .gtbl{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
  .gtbl th{font-family:var(--disp);font-weight:600;color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.03em;padding:4px 2px;text-align:center}
  .gtbl td{padding:7px 2px;text-align:center;border-top:1px solid var(--line)}
  .gtbl .tl{text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0;width:99%}
  .gtbl .tl .fl{font-size:15px}
  .gtbl .pos{color:var(--muted);font-family:var(--disp);font-weight:700;width:20px}
  .gtbl .pts{font-family:var(--disp);font-weight:800;color:var(--text)}
  .gtbl tr.adv .pos{color:var(--pitch)}
  .gtbl tr.adv .tl{box-shadow:inset 3px 0 0 var(--pitch);padding-left:7px}
  .gtbl tr.third .pos{color:var(--gold)}
  .gtbl tr.third .tl{box-shadow:inset 3px 0 0 var(--gold);padding-left:7px}
  .gkey{text-align:center;margin:10px 0 0;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ================= data ================= */
const GROUPS = {
  A:["Mexico","South Korea","South Africa","Czechia"],
  B:["Canada","Switzerland","Qatar","Bosnia-Herzegovina"],
  C:["Brazil","Morocco","Scotland","Haiti"],
  D:["USA","Paraguay","Australia","Türkiye"],
  E:["Germany","Ecuador","Ivory Coast","Curaçao"],
  F:["Netherlands","Japan","Tunisia","Sweden"],
  G:["Belgium","Iran","Egypt","New Zealand"],
  H:["Spain","Uruguay","Saudi Arabia","Cape Verde"],
  I:["France","Senegal","Norway","Iraq"],
  J:["Argentina","Austria","Algeria","Jordan"],
  K:["Portugal","Colombia","Uzbekistan","DR Congo"],
  L:["England","Croatia","Panama","Ghana"]
};
/* team → ISO-3166 code for flag images (emoji flags don't render on Windows) */
const CODES = {
  "Mexico":"mx","South Korea":"kr","South Africa":"za","Czechia":"cz",
  "Canada":"ca","Switzerland":"ch","Qatar":"qa","Bosnia-Herzegovina":"ba",
  "Brazil":"br","Morocco":"ma","Scotland":"gb-sct","Haiti":"ht",
  "USA":"us","Paraguay":"py","Australia":"au","Türkiye":"tr",
  "Germany":"de","Ecuador":"ec","Ivory Coast":"ci","Curaçao":"cw",
  "Netherlands":"nl","Japan":"jp","Tunisia":"tn","Sweden":"se",
  "Belgium":"be","Iran":"ir","Egypt":"eg","New Zealand":"nz",
  "Spain":"es","Uruguay":"uy","Saudi Arabia":"sa","Cape Verde":"cv",
  "France":"fr","Senegal":"sn","Norway":"no","Iraq":"iq",
  "Argentina":"ar","Austria":"at","Algeria":"dz","Jordan":"jo",
  "Portugal":"pt","Colombia":"co","Uzbekistan":"uz","DR Congo":"cd",
  "England":"gb-eng","Croatia":"hr","Panama":"pa","Ghana":"gh"
};
/* Knockout uses a fill-the-whole-bracket model (March Madness): doubling points
   per correct pick. Each round's max is the same (16): 16×1, 8×2, 4×4, 2×8, 1×16. */
const ROUNDS = [
  {key:"group", name:"Group Stage",    pts:1,  hint:"Pick 1st, 2nd, 3rd per group — exact position · live scoring"},
  {key:"r32",   name:"Round of 32",    pts:1,  hint:"16 games · 1 pt each"},
  {key:"r16",   name:"Round of 16",    pts:2,  hint:"8 games · 2 pts each"},
  {key:"qf",    name:"Quarter-finals", pts:4,  hint:"4 games · 4 pts each"},
  {key:"sf",    name:"Semi-finals",    pts:8,  hint:"2 games · 8 pts each"},
  {key:"final", name:"Final",          pts:16, hint:"Champion · 16 pts"}
];
const KO=["r32","r16","qf","sf","final"];
const GROUP_LOCK = new Date("2026-06-11T19:00:00Z"); // opener kickoff, 3pm ET
const fl=t=>{const c=CODES[t];return c
  ?`<img class="flag" src="https://flagcdn.com/24x18/${c}.png" srcset="https://flagcdn.com/48x36/${c}.png 2x" width="24" height="18" alt="" loading="lazy" decoding="async">`
  :`<span class="flag noflag">⚽</span>`;};
const ORD=["1st","2nd","3rd"];
const ORD4=["1st","2nd","3rd","4th"];
/* client-side gate for the Commish TAB only — cosmetic. Destructive overrides/
   deletes are still gated server-side by COMMISH_CODE in pool.mjs. */
const COMMISH_PW="commish";

/* ESPN name → canonical name */
const norm=s=>(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]/g,"");
const CANON={};
Object.values(GROUPS).flat().forEach(t=>CANON[norm(t)]=t);
Object.assign(CANON,{
  unitedstates:"USA", usa:"USA", usmnt:"USA",
  korearepublic:"South Korea", southkorea:"South Korea",
  czechrepublic:"Czechia", czechia:"Czechia",
  bosniaandherzegovina:"Bosnia-Herzegovina", bosniaherzegovina:"Bosnia-Herzegovina",
  caboverde:"Cape Verde", capeverde:"Cape Verde", capeverdeislands:"Cape Verde",
  cotedivoire:"Ivory Coast", ivorycoast:"Ivory Coast",
  turkiye:"Türkiye", turkey:"Türkiye",
  drcongo:"DR Congo", democraticrepublicofthecongo:"DR Congo", congodr:"DR Congo",
  curacao:"Curaçao", ireland:"Ireland"
});
const canonical=name=>CANON[norm(name)]||name;

/* round bucketing by Eastern-time date */
const etFmt=new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",month:"2-digit",day:"2-digit"});
function etMD(d){const p=etFmt.formatToParts(d);const m=+p.find(x=>x.type==="month").value,dd=+p.find(x=>x.type==="day").value;return m*100+dd;}
function bucket(d){
  const md=etMD(d);
  if(md>=628&&md<=703) return "r32";
  if(md>=704&&md<=707) return "r16";
  if(md>=709&&md<=711) return "qf";
  if(md>=714&&md<=715) return "sf";
  if(md===719) return "final";
  return null; // group games + Jul 18 third-place game are ignored
}

/* ================= state ================= */
let state={ me:null, picks:{}, players:[], overrides:{},
  groupsFinal:{},          // L -> [1st,2nd,3rd] when known
  bracket:{games:{},order:{r32:[],r16:[],qf:[],sf:[],final:[]},ready:false}, // KO tree
  standings:[],            // [{L, rows:[{team,rank,gp,w,d,l,gf,ga,gd,pts}]}]
  teamGroup:{},            // team -> group letter
  fixtures:[],             // full tournament schedule (all 104 matches)
  tab:"pick", viewRound:"group", wcSub:"schedule", lastTotal:0, dataErr:null,
  previewBracket:false, previewData:null, previewPicks:{} }; // commish bracket preview (in-memory)

/* ================= api ================= */
async function api(path,opts){ const r=await fetch(path,opts); if(!r.ok) throw new Error(path+" "+r.status); return r.json(); }

async function loadPool(){
  try{
    const d=await api("/api/pool");
    state.players=d.players||[]; state.overrides=d.overrides||{};
    const mine=state.players.find(p=>slug(p.name)===state.me.slug);
    if(mine && Object.keys(state.picks).length===0) state.picks=mine.picks||{};
  }catch(e){ console.error(e); state.dataErr="pool"; }
}

async function loadEspn(){
  state.dataErr=null;
  /* standings → final group order */
  try{
    const s=await api("/api/espn?type=standings");
    const groupsFinal={}, standings=[], teamGroup={};
    const kids=(s.children||s.groups||[]);
    for(const kid of kids){
      const label=(kid.name||kid.abbreviation||"").match(/Group\s+([A-L])/i);
      if(!label) continue;
      const L=label[1].toUpperCase();
      const entries=(kid.standings&&kid.standings.entries)||kid.entries||[];
      if(entries.length<4) continue;
      const rows=entries.map(en=>{
        const team=canonical(en.team&&(en.team.displayName||en.team.name));
        const stat=n=>{const x=(en.stats||[]).find(st=>st.name===n||st.type===n);return x?+x.value:null;};
        teamGroup[team]=L;
        return {team, rank:stat("rank")??99, gp:stat("gamesPlayed")??0,
          w:stat("wins")??0, d:stat("ties")??0, l:stat("losses")??0,
          gf:stat("pointsFor")??0, ga:stat("pointsAgainst")??0,
          gd:stat("pointDifferential")??0, pts:stat("points")??0};
      });
      rows.sort((a,b)=> a.rank-b.rank || b.pts-a.pts || b.gd-a.gd);
      standings.push({L,rows});
      if(rows.every(r=>r.gp>=3)) groupsFinal[L]=rows.slice(0,3).map(r=>r.team);
    }
    standings.sort((a,b)=>a.L.localeCompare(b.L));
    state.groupsFinal=groupsFinal; state.standings=standings; state.teamGroup=teamGroup;
  }catch(e){ console.error("standings",e); state.dataErr="espn"; }

  /* one scoreboard call for the WHOLE tournament → bracket tree + full schedule */
  try{
    const sb=await api("/api/espn?type=scoreboard&dates=20260611-20260720");
    const fixtures=[], ko=[];
    const num=s=>{const n=parseInt(s,10);return isNaN(n)?null:n;};
    for(const ev of (sb.events||[])){
      const when=new Date(ev.date);
      const comp=(ev.competitions&&ev.competitions[0])||{};
      const cs=comp.competitors||[]; if(cs.length<2) continue;
      const home=cs.find(c=>c.homeAway==="home")||cs[0];
      const away=cs.find(c=>c.homeAway==="away")||cs[1];
      const aRaw=(home.team&&(home.team.displayName||home.team.name))||"";
      const bRaw=(away.team&&(away.team.displayName||away.team.name))||"";
      const a=canonical(aRaw), b=canonical(bRaw);
      const st=(comp.status&&comp.status.type)||{};
      const stt=st.state||"pre";            // pre | in | post
      const completed=!!st.completed, live=stt==="in";
      const placeholder=/tbd|winner|runner|third|place|group/i.test(aRaw+" "+bRaw); // KO slot not set yet
      let winner=null;
      if(completed){const w=cs.find(c=>c.winner===true);winner=w?canonical((w.team&&(w.team.displayName||w.team.name)))||null:null;}
      const rk=bucket(when);
      fixtures.push({id:String(ev.id),when,a,b,aRaw,bRaw,
        aScore:num(home.score),bScore:num(away.score),
        state:stt,completed,live,winner,placeholder,
        stage:rk?ROUNDS.find(r=>r.key===rk).name:(state.teamGroup[a]?"Group "+state.teamGroup[a]:"Group Stage"),
        detail:st.shortDetail||""});
      if(rk) ko.push({id:String(ev.id),name:ev.name||"",round:rk,a,b,aRaw,bRaw,placeholder,kickoff:when,winner,live});
    }
    fixtures.sort((x,y)=>x.when-y.when);
    state.bracket=buildBracket(ko); state.fixtures=fixtures;
  }catch(e){ console.error("scoreboard",e); state.dataErr="espn"; }
}

/* Build the knockout tree from ESPN events. Ordinals come from id order within a
   round; feeder links are parsed from placeholder names ("Round of 32 3 Winner"),
   which is exactly how ESPN expresses the 2026 bracket. */
function buildBracket(evs){
  const byRound={r32:[],r16:[],qf:[],sf:[],final:[]};
  for(const e of evs){ if(byRound[e.round]) byRound[e.round].push(e); }
  const order={};
  for(const rk of KO){ byRound[rk].sort((x,y)=>(""+x.id).localeCompare(""+y.id,undefined,{numeric:true})); order[rk]=byRound[rk].map(e=>e.id); }
  const phrase={"Round of 32":"r32","Round of 16":"r16","Quarterfinal":"qf","Semifinal":"sf"};
  const games={};
  for(const rk of KO){
    byRound[rk].forEach((e,i)=>{
      let feeders=null;
      if(rk!=="r32"){
        feeders=[]; const re=/(Round of 32|Round of 16|Quarterfinal|Semifinal) (\d+) Winner/g; let m;
        while((m=re.exec(e.name))){ const fid=(order[phrase[m[1]]]||[])[(+m[2])-1]; if(fid) feeders.push(fid); }
        if(feeders.length!==2) feeders=null;
      }
      games[e.id]={id:e.id,round:rk,ord:i+1,feeders,a:e.a,b:e.b,aRaw:e.aRaw,bRaw:e.bRaw,
        placeholder:e.placeholder,kickoff:e.kickoff,winner:e.winner,live:e.live};
    });
  }
  const ready=order.r32.length===16 && order.r32.every(id=>!games[id].placeholder);
  return {games,order,ready};
}

/* overrides win over ESPN.
   Group order is LIVE: it tracks the current standings table, so points
   move up and down as group games finish and the table reorders. Returns the
   full rank order (4 teams) once a group has kicked off, else []. */
function groupResult(L){
  const ov=state.overrides.group&&state.overrides.group[L];
  if(ov&&ov.length>=3) return ov;
  const g=state.standings.find(s=>s.L===L);
  if(!g||!g.rows.some(r=>r.gp>0)) return []; // not started → nothing to score yet
  return g.rows.map(r=>r.team);
}
/* a group is settled when every team has played 3 (or a commish override is set) */
function groupDone(L){
  const ov=state.overrides.group&&state.overrides.group[L];
  if(ov&&ov.length>=3) return true;
  const g=state.standings.find(s=>s.L===L);
  return !!(g&&g.rows.length===4&&g.rows.every(r=>r.gp>=3));
}
/* actual winner of a knockout game (commish override beats ESPN) */
function koWinner(g){
  if(!g) return null;
  const ov=state.overrides.results&&state.overrides.results[g.id];
  return ov||g.winner||null;
}
/* ---- bracket helpers ---- */
const koPts=rk=>ROUNDS.find(r=>r.key===rk).pts;
const finalId=()=>state.bracket.order.final[0];
function firstKO(){ // earliest R32 kickoff
  const ids=state.bracket.order.r32; let min=null;
  for(const id of ids){const k=state.bracket.games[id].kickoff; if(k&&(!min||k<min))min=k;}
  return min;
}
function bracketLocked(){ const f=firstKO(); return !!(f&&Date.now()>=f.getTime()); }
function bracketOpen(){ return state.bracket.ready && !bracketLocked(); } // fillable window
/* the two teams available to win game g, per THESE picks (r32 = real teams) */
function slotTeams(g,bp){
  if(!g) return [null,null];
  if(g.round==="r32") return g.placeholder?[null,null]:[g.a,g.b];
  return (g.feeders||[null,null]).map(fid=>bp[fid]||null);
}
/* clear later-round picks that are no longer reachable after an upstream change */
function pruneBracket(bp,B){
  B=B||state.bracket;
  for(const rk of ["r16","qf","sf","final"]){
    for(const id of B.order[rk]){
      const t=bp[id]; if(!t) continue;
      if(!slotTeams(B.games[id],bp).includes(t)) delete bp[id];
    }
  }
  return bp;
}
/* commish-only: a sandbox bracket with R32 slots filled from current standings,
   so the bracket UI can be previewed before the field is real. Not saved. */
function buildPreviewBracket(){
  const real=state.bracket, games={}, stMap={}, usedThird=new Set();
  state.standings.forEach(s=>stMap[s.L]=s.rows);
  const resolve=raw=>{
    let m;
    if((m=raw.match(/Group ([A-L]) Winner/i))){const r=stMap[m[1].toUpperCase()];return r&&r[0]?r[0].team:raw;}
    if((m=raw.match(/Group ([A-L]) 2nd/i))){const r=stMap[m[1].toUpperCase()];return r&&r[1]?r[1].team:raw;}
    if((m=raw.match(/Third Place Group ([A-L\/]+)/i))){
      const cand=m[1].split("/");
      for(const L of cand){const r=stMap[L.toUpperCase()];if(r&&r[2]&&!usedThird.has(r[2].team)){usedThird.add(r[2].team);return r[2].team;}}
      const r=stMap[cand[0].toUpperCase()];return r&&r[2]?r[2].team:("3rd "+cand.join("/"));
    }
    return canonical(raw); // already a literal team name
  };
  for(const rk of KO) for(const id of real.order[rk]){
    const g=real.games[id];
    games[id]=rk==="r32"?{...g,a:resolve(g.aRaw),b:resolve(g.bRaw),placeholder:false}:{...g};
  }
  return {games,order:real.order,ready:true};
}

/* ================= scoring ================= */
function score(picks){
  const by={}; let total=0;
  let g=0;
  for(const L of Object.keys(GROUPS)){
    const actual=groupResult(L); const mine=(picks.group&&picks.group[L])||[];
    for(let i=0;i<3;i++){ if(actual[i]&&mine[i]&&actual[i]===mine[i]) g++; }
  }
  by.group=g; total+=g;
  const bp=picks.bracket||{};
  for(const rk of KO){
    const pts=koPts(rk); let s=0;
    for(const id of state.bracket.order[rk]){ const w=koWinner(state.bracket.games[id]); if(w&&bp[id]===w) s+=pts; }
    by[rk]=s; total+=s;
  }
  return {total,by};
}
function leaderboard(){
  const rows=state.players.map(p=>{
    const isMe=slug(p.name)===state.me.slug;
    return {name:p.name, slug:slug(p.name), ...score(isMe?state.picks:p.picks||{})};
  });
  rows.sort((a,b)=> b.total-a.total
    || b.by.final-a.by.final || b.by.sf-a.by.sf || b.by.qf-a.by.qf
    || b.by.r16-a.by.r16 || b.by.r32-a.by.r32 || b.by.group-a.by.group
    || a.name.localeCompare(b.name));
  return rows;
}
const slug=s=>(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"player";

/* ================= ui ================= */
const $=(s,r=document)=>r.querySelector(s);
function toast(msg,err){const t=$("#toast");t.textContent=msg;t.classList.toggle("err",!!err);t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}
function esc(s){return (s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function roundStatus(rk){ // group only now; knockouts use bracketStatus()
  if(rk==="group") return Date.now()<GROUP_LOCK.getTime()?"open":"locked";
  return "";
}
function bracketStatus(){ return !state.bracket.ready?"":(bracketOpen()?"open":"locked"); }
const bracketRoundFilled=(rk,bp)=>state.bracket.order[rk].length>0 && state.bracket.order[rk].every(id=>bp[id]);

/* ---- pick : Group Stage + Bracket ---- */

function renderBracketBody(){
  const preview=state.previewBracket;
  if(!preview && !state.bracket.ready){
    return {saveNote:null,html:`<div class="banner"><div><h2>Bracket</h2><p>Predict every knockout game — Round of 32 to the Final</p></div></div>

      Once the 32-team knockout field is set (right after groups finish, ~Jun 28), you'll fill out the entire bracket here. It locks the moment the first Round-of-32 game kicks off — picks are sealed for the whole tournament, March-Madness style.</div>`};
  }
  const B=preview?state.previewData:state.bracket;
  const editable=preview?true:bracketOpen();
  const bp=preview?(state.previewPicks=state.previewPicks||{}):(state.picks.bracket=state.picks.bracket||{});
  if(editable) pruneBracket(bp,B);
  const br=state.bracketRound&&B.order[state.bracketRound]&&B.order[state.bracketRound].length?state.bracketRound:"r32";
  const filled=rk=>B.order[rk].length>0 && B.order[rk].every(id=>bp[id]);
  const sub=`<div class="roundbar">`+KO.map(rk=>{
    const meta=ROUNDS.find(r=>r.key===rk);
    return `<div class="pill ${rk===br?'active':''} ${filled(rk)?'open':''}" data-br="${rk}"><span class="dot"></span>${meta.name}</div>`;
  }).join("")+`</div>`;
  const previewBar=preview?`<div class="champ" style="background:linear-gradient(90deg,rgba(245,185,46,.18),transparent)">🔍 <b style="color:var(--gold)">Preview</b> <span>— projected from current standings · not saved</span><button class="mini" id="exitPreview" style="margin-left:auto">Exit</button></div>`:"";
  const champ=bp[B.order.final[0]];
  const champBanner=`<div class="champ ${champ?'set':''}">🏆 ${champ?`<b>${fl(champ)} ${esc(champ)}</b> <span>— ${preview?'projected':'your'} champion</span>`:`<span>Pick your champion — complete the bracket</span>`}</div>`;
  const meta=ROUNDS.find(r=>r.key===br);
  const ids=B.order[br];
  const left=ids.filter(id=>!bp[id]).length;
  const statusTxt=(!preview&&bracketLocked())?'locked':editable?(left?left+' to pick':'all picked ✓'):'';
  const head=`<div class="banner"><div><h2>${meta.name}</h2><p>${meta.hint}${statusTxt?' · '+statusTxt:''}</p></div>
    <div class="val">${meta.pts} pt${meta.pts>1?'s':''} each</div></div>`;
  const cards=ids.map(id=>bracketCard(B.games[id],bp,editable,B)).join("");
  const saveNote=(!preview&&editable)?"Tap who advances. Your whole bracket locks when the Round of 32 kicks off.":null;
  return {saveNote,html:previewBar+sub+champBanner+head+cards};
}

const rabbr={r32:"R32",r16:"R16",qf:"QF",sf:"SF",final:"F"};
function bracketCard(g,bp,editable,B){
  B=B||state.bracket;
  const [t0,t1]=slotTeams(g,bp);
  const pick=bp[g.id];
  const w=koWinner(g);
  const feederLabel=i=>{const fg=B.games[(g.feeders||[])[i]];return fg?`Winner ${rabbr[fg.round]} #${fg.ord}`:"TBD";};
  const side=(team,which,idx)=>{
    let cls="side "+which; const empty=!team;
    if(w){cls+=" ro"; if(pick===team&&w===team)cls+=" correct"; else if(pick===team&&w!==team)cls+=" miss";}
    else if(!editable){cls+=" ro"; if(pick===team)cls+=" sel";}
    else if(pick===team){cls+=" sel";}
    if(empty)cls+=" empty";
    const ro=(empty||!editable||w)?'data-ro="1"':'';
    const inner=empty?`<span class="slot">${feederLabel(idx)}</span>`:`<span class="fl">${fl(team)}</span><span class="nm">${esc(team)}</span>`;
    return `<div class="${cls}" ${ro} data-bg="${g.id}" data-t="${empty?'':esc(team)}">${inner}</div>`;
  };
  const status=w?'<span class="in">✓ result in</span>':g.live?'<span class="live">● Live</span>':'';
  return `<div class="match"><div class="mh"><span>${ROUNDS.find(r=>r.key===g.round).name} · #${g.ord}</span><span>${status}</span></div>
    <div class="vs">${side(t0,"left",0)}<span class="mid">v</span>${side(t1,"right",1)}</div></div>`;
}

function groupCard(L,editable){
  const teams=GROUPS[L];
  const sel=(state.picks.group&&state.picks.group[L])||[];
  const actual=groupResult(L);     // live standings order (4 teams) once started
  const scored=actual.length>=3;   // group has kicked off → live points apply
  const done=groupDone(L);         // all games played → settled
  const rows=teams.map(t=>{
    let cls="team",stamp="";
    const myPos=sel.indexOf(t),realPos=actual.indexOf(t);
    if(scored){
      cls+=" ro";
      if(myPos>=0&&myPos===realPos){cls+=" correct";stamp="✓ "+ORD[myPos];}
      else if(myPos>=0){cls+=" miss";stamp="✗ "+ORD[myPos]+(realPos>=0?" → "+ORD4[realPos]:"");}
      else if(realPos>=0){stamp=ORD4[realPos];}
    }else if(myPos>=0){cls+=" sel";stamp=ORD[myPos];}
    return `<div class="${cls}" data-g="${L}" data-t="${esc(t)}" ${editable&&!scored?'':'data-ro="1"'}>
      <span class="fl">${fl(t)}</span><span class="nm">${esc(t)}</span><span class="stamp">${stamp||"Pick"}</span></div>`;
  }).join("");
  const label=done?'final':scored?'<span class="live">● live</span>':editable?sel.length+"/3 placed":"locked";
  return `<div class="gcard"><div class="gh"><span class="gl">Group ${L}</span>
    <span class="pick-n">${label}</span></div>${rows}</div>`;
}

document.addEventListener("click",e=>{
  const team=e.target.closest(".team");
  if(team&&!team.dataset.ro&&state.tab==="pick"){
    const L=team.dataset.g,t=team.dataset.t;
    state.picks.group=state.picks.group||{};const arr=state.picks.group[L]||[];
    const i=arr.indexOf(t);
    if(i>=0)arr.splice(i,1); else{if(arr.length>=3)arr.pop();arr.push(t);}
    state.picks.group[L]=arr;renderPick($("#view"));
  }
  const side=e.target.closest(".side");
  if(side&&!side.dataset.ro&&state.tab==="pick"&&side.dataset.bg){
    const preview=state.previewBracket;
    const B=preview?state.previewData:state.bracket;
    if(!(preview?true:bracketOpen()))return;
    const t=side.dataset.t; if(!t)return;
    const bp=preview?(state.previewPicks=state.previewPicks||{}):(state.picks.bracket=state.picks.bracket||{});
    bp[side.dataset.bg]=t;
    pruneBracket(bp,B);
    renderPick($("#view"));
  }
});

async function savePicks(){
  try{
    const r=await fetch("/api/pool",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({action:"save",name:state.me.name,picks:state.picks})});
    if(!r.ok)throw new Error("save "+r.status);
    await refresh(); toast("Picks saved");
  }catch(e){console.error(e);toast("Save failed — try again",true);}
}

/* ---- player picks modal (read-only) ----
   reveal=true (commissioner) shows every pick regardless of lock state. */
function playerPicksHtml(picks,reveal){
  let html="";
  /* group stage: all-or-nothing at the single group lock */
  let gBody;
  if(!reveal && roundStatus("group")!=="locked"){
    gBody=`<div class="pp-hidden">Hidden until group picks lock</div>`;
  }else{
    gBody=Object.keys(GROUPS).map(L=>{
      const sel=(picks.group&&picks.group[L])||[];
      const actual=groupResult(L), resolved=actual.length>=3;
      const teams=[0,1,2].map(pos=>{
        const t=sel[pos];
        if(!t) return `<span class="pp-team empty">${ORD[pos]} · —</span>`;
        let cls="pp-team"; if(resolved) cls+=actual[pos]===t?" correct":" miss";
        return `<span class="${cls}">${ORD[pos]} · ${fl(t)} ${esc(t)}</span>`;
      }).join("");
      return `<div class="pp-grow"><span class="pp-lbl">Group ${L}</span><div class="pp-teams">${teams}</div></div>`;
    }).join("");
  }
  html+=`<div class="pp-round"><h4>Group Stage</h4>${gBody}</div>`;
  /* bracket: hidden until it locks (first R32 kickoff), then everyone's is visible */
  const bp=picks.bracket||{};
  const showBracket=reveal||bracketLocked();
  for(const rk of KO){
    const R=ROUNDS.find(r=>r.key===rk); let body;
    if(!state.bracket.ready) body=`<div class="pp-hidden">Bracket not set yet</div>`;
    else if(!showBracket) body=`<div class="pp-hidden">Hidden until the bracket locks</div>`;
    else body=`<div class="pp-chips">`+state.bracket.order[rk].map(id=>{
      const t=bp[id], w=koWinner(state.bracket.games[id]);
      if(!t) return `<span class="pp-team empty">—</span>`;
      let cls="pp-team"; if(w) cls+=t===w?" correct":" miss";
      return `<span class="${cls}">${fl(t)} ${esc(t)}</span>`;
    }).join("")+`</div>`;
    html+=`<div class="pp-round"><h4>${R.name}</h4>${body}</div>`;
  }
  return html;
}
function openPlayerPicks(plslug,reveal){
  const isMe=plslug===state.me.slug;
  const p=state.players.find(x=>slug(x.name)===plslug);
  const name=isMe?state.me.name:(p&&p.name);
  if(!name) return;
  const picks=isMe?state.picks:(p.picks||{});
  closePlayerPicks();
  const tag=reveal?' · all picks':isMe?' · you':'';
  const ov=document.createElement("div"); ov.className="pp-overlay"; ov.id="ppOverlay";
  ov.innerHTML=`<div class="pp-card">
    <div class="pp-head"><h3>${esc(name)}${tag}</h3>
      <button class="pp-x" id="ppClose" aria-label="Close">✕</button></div>
    <div class="pp-body">${playerPicksHtml(picks,reveal)}</div></div>`;
  document.body.appendChild(ov);
  $("#ppClose").onclick=closePlayerPicks;
  ov.addEventListener("click",e=>{if(e.target===ov)closePlayerPicks();});
}
function closePlayerPicks(){const o=$("#ppOverlay");if(o)o.remove();}

/* ---- World Cup 2026 : schedule + groups ---- */
function renderWC(v){
  const sub=state.wcSub;
  const subbar=`<div class="roundbar" style="padding-top:18px">
    <div class="pill ${sub==='schedule'?'active':''}" data-sub="schedule">Schedule</div>
    <div class="pill ${sub==='groups'?'active':''}" data-sub="groups">Groups & Standings</div></div>`;
  const body=sub==="groups"?groupsView():scheduleView();
  const blurb=sub==="groups"
    ?"Live group tables — top 2 advance, plus the 8 best 3rd-place teams"
    :"Every fixture · kickoff times in your local timezone";
  v.innerHTML=subbar+`
    <div class="banner"><div><h2>World Cup 2026</h2><p>${blurb}</p></div>
      <div class="val" id="wcRefresh" style="cursor:pointer">↻ Refresh</div></div>
    ${state.dataErr==='espn'?'<div class="banner"><p class="live">Live data hiccup — showing last known state.</p></div>':''}
    ${body}`;
  v.querySelectorAll(".pill[data-sub]").forEach(p=>p.onclick=()=>{state.wcSub=p.dataset.sub;renderWC(v);});
  $("#wcRefresh").onclick=async()=>{await refresh();toast("Refreshed");};
  clearSaveBar();
}
function scheduleView(){
  const fx=state.fixtures;
  if(!fx.length) return `<div class="empty"><div class="big">Schedule unavailable</div>Couldn't load fixtures from ESPN just now — tap Refresh.</div>`;
  const dayFmt=new Intl.DateTimeFormat(undefined,{weekday:"short",month:"short",day:"numeric"});
  const days=[],idx={};
  for(const m of fx){
    const key=dayFmt.format(m.when);
    if(idx[key]==null){idx[key]=days.length;days.push({key,items:[]});}
    days[idx[key]].items.push(m);
  }
  return days.map(d=>`<div class="schday"><div class="schdate">${d.key}</div>`+
    d.items.map(fixtureRow).join("")+`</div>`).join("");
}
function fixtureRow(m){
  const t=m.when.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
  const side=(real,raw,ph,win)=>m.placeholder
    ?`<span class="ph">${esc(raw)}</span>`
    :`<span class="fl">${fl(real)}</span><span class="${win?'win':''}">${esc(real)}</span>`;
  const aw=m.completed&&m.winner===m.a, bw=m.completed&&m.winner===m.b;
  let right;
  if(m.completed) right=`<span class="schscore">${m.aScore}–${m.bScore}</span><span class="schstat ft">FT</span>`;
  else if(m.live) right=`<span class="schscore">${m.aScore??0}–${m.bScore??0}</span><span class="schstat live">● ${esc(m.detail||'Live')}</span>`;
  else right=`<span class="schstat">${t}</span>`;
  return `<div class="schrow">
    <div class="schtop"><span class="schstage">${esc(m.stage)}</span><span class="schright">${right}</span></div>
    <div class="schteams"><span class="nmL">${side(m.a,m.aRaw,m.placeholder,aw)}</span>
      <span class="schv">v</span>
      <span class="nmR">${side(m.b,m.bRaw,m.placeholder,bw)}</span></div></div>`;
}
function groupsView(){
  const gs=state.standings;
  if(!gs.length) return `<div class="empty"><div class="big">Standings not in yet</div>Group tables appear once the tournament data loads — tap Refresh.</div>`;
  const liveTeams=new Set(state.fixtures.filter(m=>m.live).flatMap(m=>[m.a,m.b]));
  const grid=`<div class="grid">`+gs.map(g=>{
    const live=g.rows.some(r=>liveTeams.has(r.team));
    const body=g.rows.map((r,i)=>{
      const cls=i<2?"adv":i===2?"third":"out";
      return `<tr class="${cls}"><td class="pos">${i+1}</td>
        <td class="tl"><span class="fl">${fl(r.team)}</span> ${esc(r.team)}</td>
        <td>${r.gp}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${r.gd>0?'+':''}${r.gd}</td><td class="pts">${r.pts}</td></tr>`;
    }).join("");
    return `<div class="gtab"><div class="gth"><span class="ttl">Group ${g.L}</span>
        ${live?'<span class="schstat live">● Live</span>':''}</div>
      <table class="gtbl"><thead><tr><th></th><th class="tl">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
      <tbody>${body}</tbody></table></div>`;
  }).join("")+`</div>`;
  return grid+`<p class="gkey"><b style="color:var(--pitch)">▍</b> Top 2 advance · <b style="color:var(--gold)">▍</b> 3rd place (8 of 12 advance)</p>`;
}

  <div class="cbox"><h3>Group stage</h3>

/* ---- commish ---- */
function renderCommish(v){
  const ov=state.overrides;
  let g=`<div class="cbox"><h3>Group result overrides</h3>
    <p class="sub">Only needed if the live feed misbehaves. Tap in finishing order (1st → 2nd → 3rd). Overrides beat ESPN data.</p>`;
  g+=Object.keys(GROUPS).map(L=>{
    const cur=(ov.group&&ov.group[L])||[];
    const live=groupResult(L).slice(0,3); // current standings top-3 being scored
    const opts=GROUPS[L].map(t=>{
      const p=cur.indexOf(t);const tag=p>=0?["1·","2·","3·"][p]:"";
      return `<button class="mini ${p>=0?'on':''}" data-act="gres" data-g="${L}" data-t="${esc(t)}">${tag}${fl(t)} ${esc(t)}</button>`;
    }).join(" ");
    return `<div class="crow"><span class="lbl">Group ${L} ${live.length?'<span class="status-tag st-open">'+(groupDone(L)?'final':'live')+': '+live.map(x=>esc(x)).join(" · ")+'</span>':''}</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;padding-bottom:8px">${opts}</div>`;
  }).join("")+`</div>`;

  let k="";
  for(const rk of KO){
    const ids=state.bracket.order[rk].filter(id=>!state.bracket.games[id].placeholder); // real matchups only
    if(!ids.length) continue;
    k+=`<div class="cbox"><h3>${ROUNDS.find(x=>x.key===rk).name} winner overrides</h3><p class="sub">Tap to force a winner; tap again to clear.</p>`+
      ids.map(id=>{
        const m=state.bracket.games[id]; const cur=ov.results&&ov.results[id];
        return `<div class="crow"><span class="lbl">${fl(m.a)} ${esc(m.a)} v ${esc(m.b)} ${fl(m.b)} ${m.winner?'<span class="status-tag st-open">live: '+esc(m.winner)+'</span>':''}</span><span>
          <button class="mini ${cur===m.a?'on':''}" data-act="kres" data-m="${id}" data-t="${esc(m.a)}">${esc(m.a)}</button>
          <button class="mini ${cur===m.b?'on':''}" data-act="kres" data-m="${id}" data-t="${esc(m.b)}">${esc(m.b)}</button></span></div>`;
      }).join("")+`</div>`;
  }

  let pl=`<div class="cbox"><h3>Players</h3>
    <p class="sub">Edit a player's name — e.g. add a last name to someone who only entered a first name. Renaming moves their picks and score to the new name.</p>`;
  if(!state.players.length){
    pl+=`<p class="sub" style="margin:0">No players have joined yet.</p>`;
  }else{
    pl+=state.players.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p=>
      `<div class="crow nmrow"><input class="pname" type="text" value="${esc(p.name)}" autocomplete="off">
        <button class="mini viewBtn" data-pl="${slug(p.name)}">View picks</button>
        <button class="mini gold renameBtn" data-from="${esc(p.name)}">Rename</button></div>`).join("");
  }
  pl+=`</div>`;

  const prev=`<div class="cbox"><h3>Bracket preview</h3>
    <p class="sub">Click through the whole knockout bracket now, with the 32 slots filled from the current live standings. Read-only — nothing is saved and it doesn't touch anyone's real picks.</p>
    <button class="btn" id="previewBr">Open bracket preview</button></div>`;

  v.innerHTML=`<div class="roundbar" style="padding-top:18px"></div>
    <div class="banner"><div><h2>Commissioner</h2><p>Everything is automatic — this tab is your manual override</p></div></div>
    <div class="cbox"><div class="field"><label>Commish passcode (if set in Netlify)</label>
      <input type="password" id="ccode" value="${esc(localStorage.getItem("wc_code")||"")}" placeholder="optional"></div></div>
    ${prev}${pl}${g}${k}
    <div class="cbox"><button class="btn gold" id="pushOv">Save overrides</button></div>`;
  clearSaveBar();
  $("#previewBr").onclick=()=>{
    if(!state.standings.length){toast("Standings not loaded yet",true);return;}
    state.previewData=buildPreviewBracket(); state.previewPicks={};
    state.previewBracket=true; state.tab="pick"; state.viewRound="bracket"; state.bracketRound="r32";
    render();
  };
  v.querySelectorAll("[data-act]").forEach(b=>b.onclick=()=>{
    const a=b.dataset.act;
    if(a==="gres"){
      const L=b.dataset.g,t=b.dataset.t;
      ov.group=ov.group||{};const arr=ov.group[L]||[];const i=arr.indexOf(t);
      if(i>=0)arr.splice(i,1);else{if(arr.length>=3)arr.pop();arr.push(t);}
      ov.group[L]=arr;
    }else if(a==="kres"){
      const m=b.dataset.m,t=b.dataset.t;ov.results=ov.results||{};
      if(ov.results[m]===t)delete ov.results[m];else ov.results[m]=t;
    }
    renderCommish(v);
  });
  $("#pushOv").onclick=async()=>{
    const code=$("#ccode").value;localStorage.setItem("wc_code",code);
    try{
      const r=await fetch("/api/pool",{method:"POST",headers:{"content-type":"application/json"},
        body:JSON.stringify({action:"override",code,overrides:ov})});
      if(!r.ok)throw new Error(r.status);
      await refresh();toast("Overrides saved");
    }catch(e){toast("Override failed"+(String(e).includes("403")?" — wrong passcode":""),true);}
  };
  v.querySelectorAll(".viewBtn").forEach(b=>b.onclick=()=>openPlayerPicks(b.dataset.pl,true));
  v.querySelectorAll(".renameBtn").forEach(b=>b.onclick=async()=>{
    const from=b.dataset.from;
    const to=b.closest(".nmrow").querySelector(".pname").value.trim();
    if(!to){toast("Enter a name",true);return;}
    if(to===from){toast("Name unchanged");return;}
    const code=$("#ccode").value;localStorage.setItem("wc_code",code);
    b.disabled=true;
    try{
      const r=await fetch("/api/pool",{method:"POST",headers:{"content-type":"application/json"},
        body:JSON.stringify({action:"rename",code,from,to})});
      if(!r.ok)throw new Error(r.status);
      await refresh();toast(`Renamed to ${to}`); // refresh() re-renders the Commish tab
    }catch(e){b.disabled=false;const s=String(e);
      toast(s.includes("403")?"Wrong passcode":s.includes("409")?"That name is already taken":s.includes("404")?"Player not found":"Rename failed",true);}
  });
}

function mountSaveBar(note,onSave){

/* ---- gate ---- */
function renderGate(){
  clearSaveBar();
  $("#app").innerHTML=`<div class="gate">
    <h1>World Cup Pool <span>'26</span></h1>
    <p>Predict the World Cup one round at a time. Enter your first and last name to join the pool.</p>
    <div class="field"><label>First name</label><input type="text" id="fn" placeholder="e.g. Daniel" autocomplete="off"></div>
    <div class="field" style="margin-top:12px"><label>Last name</label><input type="text" id="ln" placeholder="e.g. Bebekian" autocomplete="off"></div>
    <label class="check" style="display:flex;align-items:center;gap:10px;margin:18px 0 0;cursor:pointer;font-size:14px">
      <input type="checkbox" id="cm" style="width:18px;height:18px;accent-color:var(--gold)"> Show commissioner tools</label>
    <div class="field" id="cpwWrap" style="display:none;margin-top:12px"><label>Commissioner password</label>
      <input type="password" id="cpw" placeholder="enter passcode" autocomplete="off"></div>
    <button class="btn" id="join" style="width:100%;margin-top:22px">Join pool</button></div>`;
  const cm=$("#cm"),cpwWrap=$("#cpwWrap");
  cm.onchange=()=>{cpwWrap.style.display=cm.checked?"block":"none";if(cm.checked)$("#cpw").focus();};
  const go=async()=>{
    const fn=$("#fn").value.trim(),ln=$("#ln").value.trim();
    if(!fn){$("#fn").focus();return;}
    if(!ln){toast("Please enter your last name too",true);$("#ln").focus();return;}
    const name=fn+" "+ln;
    let commish=false;
    if(cm.checked){
      if($("#cpw").value!==COMMISH_PW){toast("Wrong commissioner password",true);$("#cpw").focus();return;}
      commish=true;
    }
    state.me={name,slug:slug(name),commish};
    state.picks={}; // hard-reset in-memory picks before loading this player's from server
    await Promise.all([loadEspn(),loadPool()]);render();
  };
  $("#join").onclick=go;
  ["fn","ln","cpw"].forEach(id=>$("#"+id).addEventListener("keydown",e=>{if(e.key==="Enter")go();}));
  $("#fn").focus();
}

/* ---- boot ---- */
async function refresh(){await Promise.all([loadEspn(),loadPool()]);render();}
(async function boot(){
  /* No auto-login: identity is never persisted, so every visit starts at the
     sign-in gate. Prevents a shared/previous session from hijacking the account. */
  localStorage.removeItem("wc_me"); // clear identity persisted by older builds
  renderGate();
})();
/* live refresh: every 60s, faster while a match window is on */
setInterval(()=>{if(state.me)refresh();},60000);
